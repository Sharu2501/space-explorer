name: Space Explorer CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & qualité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff - Linting & format check
        run: ruff check app/ tests/

      - name: Run tests with coverage
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t space-explorer:latest .

      - name: Test Docker container starts
        run: |
          docker run -d -p 8000:8000 -e NASA_API_KEY="${{ secrets.NASA_API_KEY }}" --name test-container space-explorer:latest
          sleep 5
          curl -f http://localhost:8000/ || exit 1
          docker stop test-container
